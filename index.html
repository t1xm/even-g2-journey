<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Together G2</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div>
    <div class="layout">
      <h1 data-i18n="appTitleSep"></h1>
      <h1 id="ui-names"></h1>
    </div>

    <p class="subtitle" data-i18n="anniversary"></p>
    <div class="info-card">
      <img src="assets/ic-calendar.svg" alt="Calendar Icon" class="icon">
      <p id="ui-date"></p>
    </div>
    
    <div class="divider-small"></div>
    
    <div class="info-card">
      <img src="assets/ic-time.svg" alt="Clock Icon" class="icon">
      <p id="ui-exact"></p>
    </div>

    <p class="subtitle" data-i18n="inDetail"></p>
    <div class="detail">
      <div class="card">
        <p id="ui-months"></p>
      </div>
      <div class="card">
        <p id="ui-weeks"></p>
      </div>
    </div>
    <div class="divider-small"></div>
    <div class="detail">
      <div class="card">
        <p id="ui-days"></p>
      </div>
      <div class="card">
        <p id="ui-hours"></p>
      </div>
    </div>    

    <p class="subtitle" data-i18n="settings"></p>
    <div class="card">
      <p class="p" data-i18n="namesLabel"></p>
      <input type="text" id="names-input" data-i18n-placeholder="namesPlaceholder" placeholder="e.g. Lilli & Tim">

      <div class="divider"></div>

      <p class="p" data-i18n="anniversaryLabel"></p>
      <input type="date" id="date-input">
    </div>

    <div class="divider-small"></div>

    <button id="save-btn" data-i18n="saveBtn"></button>

    <p class="subtitle" data-i18n="aboutTitle"></p>
    <div class="card">
      <p data-i18n="aboutText"></p>
    </div>

    <div id="status"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
