<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Journey G2</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="app-container">
    
    <header class="header-row">
      <h1 class="text-title" data-i18n="appTitleSep"></h1>
      <h1 class="text-title" id="ui-names"></h1>
    </header>

    <h2 class="text-subtitle" data-i18n="journeyListTitle"></h2>
    <div class="card card--list">
      <div id="journey-list"></div>
    </div>

    <div class="spacer-sm"></div>

    <button class="btn btn--secondary" id="add-journey-btn">
      <img src="assets/ic-checklist.svg" alt="" class="icon icon--inline">
      <span data-i18n="newJourney"></span>
    </button>

    <h2 class="text-subtitle" data-i18n="sinceTitle"></h2>
    <div class="card card--icon">
      <img src="assets/ic-calendar.svg" alt="Calendar Icon" class="icon">
      <p class="text-body" id="ui-date"></p>
    </div>
    
    <div class="spacer-sm"></div>
    
    <div class="card card--icon">
      <img src="assets/ic-time.svg" alt="Clock Icon" class="icon">
      <p class="text-body" id="ui-exact"></p>
    </div>

    <h2 class="text-subtitle" data-i18n="inDetail"></h2>
    <div class="card-grid">
      <div class="card card--center">
        <p class="text-body" id="ui-months"></p>
      </div>
      <div class="card card--center">
        <p class="text-body" id="ui-weeks"></p>
      </div>
    </div>
    
    <div class="spacer-sm"></div>
    
    <div class="card-grid">
      <div class="card card--center">
        <p class="text-body" id="ui-days"></p>
      </div>
      <div class="card card--center">
        <p class="text-body" id="ui-hours"></p>
      </div>
    </div>    

    <h2 class="text-subtitle" data-i18n="settings"></h2>
    <div class="card">
      <label class="text-body form-label" data-i18n="titleLabel" for="names-input"></label>
      <input type="text" class="input-field" id="names-input" data-i18n-placeholder="titlePlaceholder" placeholder="e.g. Lilli & Tim">

      <div class="spacer-md"></div>

      <label class="text-body form-label" data-i18n="sinceLabel" for="date-input"></label>
      <input type="date" class="input-field" id="date-input">
    </div>

    <div class="spacer-sm"></div>

    <button class="btn btn--primary" id="save-btn">
      <img src="assets/ic-save.svg" alt="" class="icon icon--inline">
      <span data-i18n="saveBtn"></span>
    </button>

    <h2 class="text-subtitle" data-i18n="aboutTitle"></h2>
    <div class="card">
      <p class="text-body" data-i18n="aboutText"></p>
    </div>

    <div class="toast" id="status"></div>
    
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
