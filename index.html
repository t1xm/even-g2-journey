<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Together G2</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div>
    <div class="layout">
      <h1>Together │</h1>
      <h1 id="ui-names"></h1>
    </div>

    <p class="subtitle">Anniversary</p>
    <div class="info-card">
      <img src="assets/ic-calendar.svg" alt="Calendar Icon" class="icon">
      <p id="ui-date"></p>
    </div>
    
    <div class="divider-small"></div>
    
    <div class="info-card">
      <img src="assets/ic-time.svg" alt="Clock Icon" class="icon">
      <p id="ui-exact"></p>
    </div>

    <p class="subtitle">In detail</p>
    <div class="detail">
      <div class="card">
        <p id="ui-months"></p>
      </div>
      <div class="card">
        <p id="ui-weeks"></p>
      </div>
    </div>
    <div class="divider-small"></div>
    <div class="detail">
      <div class="card">
        <p id="ui-days"></p>
      </div>
      <div class="card">
        <p id="ui-hours"></p>
      </div>
    </div>    

    <p class="subtitle">Settings</p>
    <div class="card">
      <p class="p">Names</p>
      <input type="text" id="names-input" placeholder="e.g. Lilli & Tim">

      <div class="divider"></div>

      <p class="p">Anniversary</p>
      <input type="date" id="date-input">
    </div>

    <div class="divider-small"></div>

    <button id="save-btn">Save & Send to G2</button>

    <p class="subtitle">About Together</p>
    <div class="card">
      <p>A minimalist relationship tracker for Even Realities G2. Displays time spent with your partner in different formats on the glasses HUD. A glanceable way to celebrate milestones.</p>
    </div>

    <div id="status"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
