<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Together G2</title>
</head>
<body>

  <div>
    <h1>Together</h1>

    <p class="subtitle">Settings</p>
    <div class="card">
      <p>Names</p>
      <input type="text" id="names-input" placeholder="e.g. Tim & Lilli">

      <p>Anniversary</p>
      <input type="date" id="date-input">
    </div>


    <p class="subtitle">Over Together</p>
    <div class="card"">
      <p>A minimalist relationship tracker for Even Realities G2. Displays time spent with your partner in different formats on the glasses HUD. A glanceable way to celebrate milestones.</p>
    </div>

    

    <button id="save-btn">Auf Brille speichern</button>
    <div id="status"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
